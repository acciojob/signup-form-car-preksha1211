<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head><form method="post">
	<label for="name"></label>
</form>
<body>
	<!-- the entire body must be written by student -->
	<form method="post">
			<label for="name">Name: </label>
		<input type="text" id="name" required placeholder="name" >
         <br>
		<label for="id">Email: </label>
		<input type="email" required id="email" placeholder="email">

		<br>
		<br>
		<input type="radio" id="gender_m" required name="gender">
		<label for="gender_m">Male</label>
		<input type="radio" id="gender_f" required name="gender">
		<label for="gender_f">Female</label>
		<br>
		<br>
		
		<select  id='cars' required name="cars">
			<option value="" disabled selected>--Please choose an option--</option>
		
			<option value="audi">audi</option>
			<option value="maruti">maruti</option>
			<option value="bmw">BMW</option>
		</select>
		<br>

		<input type='number' required id="age" placeholder="age">
		<br>
		<input type='date' required id="dob" placeholder="age">
		<br>
		<input type='tel'  id="tel" placeholder="xxx-xxx-xxxx">
		<br>
		<input type='password'  id="password" placeholder="Password" required>

		<br>
		<label for="tos">I agree to the TOS :</label>
		<input type="checkbox" required id="tos">
		
	</form>

</body>

</html>
